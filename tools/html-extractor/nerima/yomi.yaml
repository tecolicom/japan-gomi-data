# 練馬区 町名→読み対応表。
#
# 要人手レビュー: 練馬区公式サイトの50音ページ(a/ka/sa/ta/na/ha/maya)から
# distinct な町名(46件、tools/html-extractor/nerima/parse.mjs 経由)を列挙し、
# 各町名の読み(ひらがな)を付した。50音ページのグループが先頭カナの裏取りに
# なっている(例: ka_gyochiiki.html の町名はすべて「か行」始まりの読み)。
#
# 主な出典:
#   - 練馬わがまち資料館「ねりまの地名今むかし(現町名1〜40)」
#     https://www.nerima-archives.jp/column_cat/places/ (公式読み仮名付き)
#   - 練馬区公式ホームページ「練馬の地名 今むかし」
#   - Wikipedia / 郵便番号地名読み方サイト(補完確認)
#
# 特記(裏取りで判明した誤りやすい点):
#   - 向山 = こうやま(古称「むこうやま」が転じた現行読み。か行ページに
#     属することからも「むこうやま」ではないと裏取りできる)
#   - 練馬区で「町」を「まち」と読む町名は 北町・石神井町・大泉町・西大泉町 の
#     4つのみ(他の「〜町」はすべて「ちょう」)

