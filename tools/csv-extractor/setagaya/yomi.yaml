# 世田谷区の町名 → 読み (五十音ソート用)。オープンデータ CSV「町名」列の 61 件。
# build.mjs が CSV の「50音」列 (区が付した先頭かな) と読みの先頭文字を突き合わせて検証する
# (濁点・半濁点は清音の行として比較: だ→た, ご→こ 等)。
# 紛らわしい読み:
#   赤堤=あかつつみ / 玉堤=たまづつみ (同じ「堤」で読みが異なる)
#   三軒茶屋=さんげんぢゃや (区・郵便の公式表記は「ヂャヤ」)
#   代沢=だいざわ / 代田=だいた (「代」は だい)
#   砧公園・駒沢公園は CSV に町名として立つ (丁目欄が空)
