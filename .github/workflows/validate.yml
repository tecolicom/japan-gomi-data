name: validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
      - run: npm run build:ics
      - run: git diff --exit-code ics/ || (echo "ics/ が古い。npm run build:ics して commit してください" && exit 1)
