  CKAN)いずれにも無し(久喜市のOD公開は学校教育施設・公共施設情報の2件のみCC-BY、ごみ日程は非公開)。県共同のごみ日程DSも無し。 「久喜市ごみ・資源物分別アプリ」(iPhone/Android)あり=収集日程表・分別辞典・アラート機能。第三者サイト(gomi-calendar.info/.com
