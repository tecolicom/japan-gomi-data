# 飯能市の読み物断片 (facts)。事実と出典に基づく。文体: です・ます調、2〜4 文。
facts:
  - id: pet-can-alternate
    title: ペットボトルと飲料缶が 1 週おきに交互
    body: >-
      飯能市では資源を出す枠が毎週決まった曜日にあり、そこにペットボトルと飲料缶が
      1 週おきに交互で回ってきます。たとえば原市場・名栗コースでは水曜がその枠で、
      第 1・3・5 週がペットボトル、第 2・4 週が飲料缶です。同じ曜日でも週によって出せる品目が
      入れ替わる、少し珍しい組み方です。
    tags: [収集頻度, 資源の中身]
    sources:
      - municipalities/saitama/hanno/2026/course-A1.yaml
      - https://www.city.hanno.lg.jp/soshikikarasagasu/kankyokeizaibu/cleancenter/4/893.html
  - id: newyear-friday-shift
    title: 年始は金曜の資源サイクルが 1 週繰り下がる
    body: >-
      資源の枠が金曜にあるコースでは、2027 年 1 月 1 日 (金) がクリーンセンター休業のため、
      その後の金曜の品目サイクルが 1 週ずつ後ろにずれます。休みで飛ばすのではなく順番が
      繰り下がる調整で、市のカレンダーも 1 月分は実日付で日程を書き換えて示しています。
    tags: [年末年始, 収集頻度]
    sources:
      - municipalities/saitama/hanno/2026/course-A2.yaml
      - municipalities/saitama/hanno/2026/course-A3.yaml
  - id: oversized-two-weekdays
    title: 粗大ごみは月 2 回、別々の曜日に分かれる
    body: >-
      飯能市の粗大ごみは月に 2 回ですが、その 2 回が「第 3 月曜と第 1 水曜」のように
      別々の曜日に分かれて収集されます (コースにより第 2 月曜と第 4 水曜など)。
      同じ品目の収集日が曜日ごとに離れて置かれる形です。
    tags: [収集頻度]
    sources:
      - municipalities/saitama/hanno/2026/course-A1.yaml
      - municipalities/saitama/hanno/2026/course-B2.yaml
  - id: burnable-weekday-groups
    title: 可燃ごみの曜日が地区で月木組と火金組に分かれる
    body: >-
      可燃ごみは週 2 回ですが、飯能市では A 系統の地区が月曜・木曜、B 系統の地区が
      火曜・金曜と、住む場所によって曜日の組み合わせが変わります。
      引っ越すと可燃ごみの曜日ごと変わることになります。
    tags: [収集頻度, 町内の違い]
    sources:
      - municipalities/saitama/hanno/2026/course-A1.yaml
      - municipalities/saitama/hanno/2026/course-B1.yaml
  - id: yearend-explicit-dates
    title: 年末年始の休みを実日付で明記
    body: >-
      飯能市のカレンダーは 12 月 29 日から 1 月 1 日あたり (コースにより 12 月 30 日を含む) を
      休業として実日付で示し、その日が本来何の収集日だったかも備考に添えています。
      年末に「本来は第 5 火曜・紙布」といった注記が残る形です。
    tags: [年末年始]
    sources:
      - municipalities/saitama/hanno/2026/course-A1.yaml
