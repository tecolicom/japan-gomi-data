notes:
  - "一次ソース: 市公式「令和8年度ごみ収集カレンダー」地区別 PDF 群。入口(nittei/index.html)から頭文字別 8 ページ(あ行/か・き/く・け・こ/さ行/た・な行/は行/ま行/や・わ行)を辿り、町別 PDF 全 86 枚を取得。各 PDF は Excel LTSC 製・A4横 2 ページの日付入り通年カレンダー(2026-04〜2027-03)でテキスト層が健全(隠し OCR 層・CID 化けなし)。CSV/テキスト版オープンデータは無し。"
  - "ライセンス: 市サイトに CC 等の宣言なし(Copyright City of Tokorozawa)。収集日という事実データを抽出して収録(練馬・杉並・調布と同じ整理)。"
  - "収録単位: 86 の町別 PDF を収集日程の同一性で 38 コースに畳み込み、87 area(町・丁目グループ)を割り当て。畳み込み結果は PDF 自身の地区見出し(例「北野、北野新町、小手指町五丁目、小手指元町地区」)が列挙する町の組と一致することを複数コースで確認済み(市の地区区分の独立裏付け)。町名の読みは日本郵便「郵便番号一覧(所沢市)」のカナ由来。"
  - "種別 7 区分 → 正典 10 語彙: 燃やせるごみ=burnable / 容器包装プラスチック(容プラ)=plastic / ペットボトル=pet_bottle / 破砕ごみ類・有害ごみ(破砕/有害・同日)=non_burnable+hazardous / びん・かん・スプレー缶(びん・缶・スプレー・同日)=glass_bottle+beverage_can(スプレー缶はかん収集に含める) / 新聞・雑誌雑がみ・段ボール(新・雑・段)=paper / 小型家電製品・古着古布(小型家電/古着・古布・同日)=metal+paper_cloth。語彙追加なし。判断: 小型家電製品に固有語彙が無いため最も近い metal(金属ごみ)に割当(古着・古布と同日の月次資源回収)、スプレー缶は独立語彙が無くかん(beverage_can)に含めた。"
  - "祝日・振替: 通常どおり収集(全 86 町で 5/5・7/20・9/21・11/3・11/23・2/11・2/23 等の祝日に収集を確認)。お盆も通常収集。"
  - "年末年始: 通年カレンダーに実日付で明示(calendar-explicit)。最終収集日は町により 12/28 または 12/29、全町 1/4 再開。休止日(12/29 または 12/30〜1/3)は cancelled override で表現。"
  - "1月の日程変更: カレンダー注記「1月は収集日程が例月と異なります。この表の日付けのとおり収集されます」。元日休みの影響で品目サイクルが 1 週ずれる曜日があり、規則(weekly/monthly_nth)に一致しない品目はその年度の実日付を monthly_specific で列挙(source どおり忠実、勝手な規則化はしない)。"
  - "粗大ごみ: 一辺おおむね 50cm 以上。事前申込制・有料(500〜2000円)の戸別収集で集積所には出せない(粗大ごみ受付センター 04-2951-1153)。集積所カレンダーの対象外なので rules には含めない。"
  - "未収録: 日本郵便の所沢市町名一覧にある「勝楽寺(ショウラクジ)」は地区別カレンダー PDF が存在しない(狭山湖畔でほぼ無居住の地域とみられる)。PDF が無い町は推測で作らず未収録とした。"
  - "検証(2026-07-19): (1)自己照合 — 生成 course を categoriesOn で通年再展開し、87 town-instance × 365 日で抽出カレンダーと全日一致(差分ゼロ)。(2)独立エンジン照合 — 全 86 PDF を poppler(pdftotext) と pdfminer(pdfplumber) の 2 エンジン・別アルゴリズムで抽出し全日一致(エンジン依存・幾何アルゴリズム依存の誤読を排除)。(3)視覚照合 — 層化サンプル(荒幡・三ケ島・青葉台の全ページ、年末年始と 1 月変則を含む計約 270 セル)を PDF 実描画と目視突合し完全一致(テキスト層とピクセルの整合=隠し層/CID 罠なしを確認)。市サイトに独立した曜日一覧表は無く、日付レベルの第2ソースは存在しない。"
  - "確率的信頼度: 独立な誤り単位は course×種別の rule 380 本(weekly 76 / monthly_nth 244 / monthly_specific 60)。ゼロ不一致 → 片側性誤り率 95% 信頼上限 <0.79%/パターン(rule of three)。自己照合が保証するのはパース忠実性、2 エンジン照合が保証するのは抽出のエンジン非依存性。ソース自体の独立照合(第2の権威表現)は無いが、ソースは全戸に配布される公式カレンダー原文そのもの(住民が従う基準と一致)。検証等級: ③自己照合 + 抽出のエンジン非依存性・視覚整合を追加担保(独立日付ソースが無いため②相当には達しない)。次年度は新カレンダー PDF 公開後に再取得のこと。"
  - "訂正(2026-07-20): 城・東所沢三〜五丁目 (course-28) に幻の収集日 2 件 (8/25 破砕・8/29 びん) が混入していたのを発見・修正。原因は抽出器の最終週セル窓 (固定60pt) がページ下部の凡例チップ 1 行目を拾う誤割当で、注記行数が少なく凡例が近いこの 2 PDF のみ影響。窓を日付行ピッチ実測基準に修正し、86 PDF 中この 4 エントリだけが差分として消えることを確認。発見の経緯はメタルール被覆率分析の残余 (規則で説明できない日) から。"
