    label: 可燃ごみ
  non_burnable:
    label: 不燃ごみ
  plastic:
    label: プラスチックごみ
    short: プラ
  paper_cloth:
    label: 古布・紙類
    short: 古布紙
  glass_bottle:
    label: ビン
  beverage_can:
    label: 缶
  pet_bottle:
    label: ペットボトル
  hazardous:
    label: 有害ごみ
