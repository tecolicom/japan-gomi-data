# 入間市。公式区分(家庭ごみの分け方・出し方):
#   可燃ごみ / 不燃ごみ / プラスチックごみ / 古布・紙類 /
#   ビン・缶・ペットボトル・有害ごみ (この4品目は同日収集)。
# 資源の「ビン・缶・ペットボトル・有害ごみ」は同日収集のため glass_bottle/beverage_can/
# pet_bottle/hazardous の4区分に分解して収録 (収集日は同一)。
