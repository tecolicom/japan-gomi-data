  火金)、他は「第2・4水」等の第n曜日指定。curl 200 で クリーンに取得可、機械可読性高い。ごみ処理は一部事務組合「児玉郡市広域市町村圏組合」 が担当 (本庄市・美里町・神川町・上里町共通の指定袋/分別アプリ)
  だが、収集曜日表は 町が公開。組合サイト(kodamakouiki.jp)にはアプリ経由のカレンダー機能あり。 分別辞典は gomisaku.jp/0241。埼玉県ODポータルに上里町は19データセット登録あるが ごみ収集日程のデータセットは無し
  (人口・コミバス等のみ)。町サイトの分別PDF R8_gomibunbetsu.pdf はテキスト層なしの画像PDF (pdftotext 空) で検証用のみ。 HTML表は曜日の周期パターンのみで暦日への展開はカレンダー生成が必要。年末年始の
  休止日は表に明記なく毎年12月に別途告知される想定。license は表記未確認で unknown。
