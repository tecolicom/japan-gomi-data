notes:
  - "一次ソース: 市公式「2026年 川口市地区別ごみ収集日カレンダー」地区別 PDF 18 枚(material/files/group/94/2026---{1..18}.pdf、A3・2ページ・テキスト層健全)。各 PDF ヘッダに市が収集ルールを 5 行で明示印字する(所沢のように日付から規則を推定する必要がない): ●一般・有害ごみ=週2曜日 / ▲プラスチック製容器包装=水曜 / びん・飲料かん=第n・m曜日 / 金属類・紙類=第n・m曜日 / ペットボトル・繊維類=第n・m曜日。地区↔町丁目の対応は banngou(番号一覧表)PDF。CSV/テキスト版オープンデータは市OD・埼玉県ポータルとも無し。"
  - "収録単位: 市の公式カレンダー番号 ①〜⑱ をそのまま course-1〜18 に対応(1:1、畳み込みなし)。町丁目 133 件(番号一覧表 PDF より)を各 course の構造化 areas(name+yomi)+ course_name_ja に収録。読み(yomi): 131 件は日本郵便の郵便カナ(川口市 11203 の郵便番号検索 data-addr_kana)由来。コンフォール東鳩ヶ谷・西鳩ヶ谷の 2 件は郵便町名でない UR 団地のため通例読み「こんふぉーる…」を採用(要確認)。ベース町名→読みの対応は tools/pdf-extractor/kawaguchi/yomi.yaml。丁目/番地/(…注記)はベース町名でひき、未収録なら throw(推測で埋めない)。"
  - "種別 5 区分 → 正典 9 語彙(同日収集の対を分けて表現): 一般ごみ=burnable(市呼称。可燃相当) / 有害ごみ=hazardous(●で一般ごみと同日) / プラスチック製容器包装=plastic / びん=glass_bottle・飲料かん=beverage_can(同日) / 金属類=metal・紙類=paper(同日) / ペットボトル=pet_bottle・繊維類=paper_cloth(同日)。語彙追加なし。判断: 「一般ごみ」に固有語彙が無いため最も近い burnable、「繊維類」(古着・古布)は paper_cloth に割当。"
  - "祝日・振替: カレンダー本体は祝日も通常どおり収集(5/5・7/20・9/21・11/3・11/23・2/11・2/23 等の祝日に全地区で収集を確認)。年間の全収集日が実日付でヘッダ規則どおりに並ぶ(規則からのズレは年末年始のみ)。"
  - "年末年始: カレンダー本体では 2026-12-29〜12-31 および 2026-01-01〜01-02 の収集を空欄(=収集なし)で表現。各 course に該当日の cancelled override を付与。⚠️ PDF 脚注に『年末年始の収集日は反映されていません。「年末・年始ごみ収集のお知らせ」をご覧ください』とあり、確定した年末年始日程は市が毎年12月に別途告知する。本データは本体カレンダーが示す休止(上記5日)を収録したもので、次年度は新カレンダー PDF と年末年始告知の再取得が必要。2027年始(1/1〜1/3)は本 PDF(2026暦年)の範囲外。"
  - "検証(2026-07-20): (1)二表現照合 — 同一 PDF 内の「ヘッダ明示ルール」と「カレンダー本体の実日付グリッド」を独立に抽出し、18地区 × 2026暦年(365日)で全日照合。年末年始休止(上記5日)を除き相違ゼロ・grid-only(規則が取りこぼす収集)ゼロ。本体グリッドは各月の曜日列を 2026 暦と突合して行アンカーを検証済(全12ヶ月一致)。(2)自己照合 — 生成 course を categoriesOn で 2026暦年に再展開し本体グリッドと全日一致(相違ゼロ)。市の公式検索ページ kawaguchi-gomimaru.jp は独立系だが同一 PDF 由来のため第2の権威表現には当たらない。"
  - "確率的信頼度: 独立な誤り単位は course×種別の rule 162 本(18地区 × 9種別: weekly 54 / monthly_nth 108)。年末年始を除きゼロ不一致 → 片側性誤り率 95% 信頼上限 <1.9%/パターン(rule of three, N=162)。ヘッダ規則と本体グリッドは PDF 内の独立した 2 表現で、両者一致が抽出忠実性とソース内整合の双方を担保する。検証等級: ③自己照合 + PDF 内二表現照合(独立した第2権威ソースは市に存在しないため②相当には達しない)。"
