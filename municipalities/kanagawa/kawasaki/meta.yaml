  # 一次ソース: 市公式「収集日一覧」HTML 表 (全7区・4ページ・計255町名)。
  # 川崎区 0000012570 / 幸区・中原区 0000012568 / 高津区・宮前区 0000012561 / 多摩区・麻生区 0000012577。
  schedule_url: https://www.city.kawasaki.jp/300/page/0000012570.html
  # 年末年始の確定 (特に小物金属・粗大の休止期間) は毎年12月頃に市 HP・広報で告知。
  yearend_url: https://www.city.kawasaki.jp/templates/faq/300/0000125241.html
notes:
  - "政令指定都市。コースは区ごとにグルーピングし course slug = <区romaji>-<n> (例 course-saiwai-3)。区romaji= 川崎区:kawasaki / 幸区:saiwai / 中原区:nakahara / 高津区:takatsu / 宮前区:miyamae / 多摩区:tama / 麻生区:asao。areas の name は公式表の町名表記そのまま。区をまたぐ同名町名 (2026年度は梶ヶ谷=高津区・宮前区の1件) のみ「<町名>（<区名>）」で曖昧性解消。 areas の yomi・machiaza_id はデジタル庁 ABR 町字マスター(フルセット)神奈川県版 + 日本郵便 ken_all 由来 (fetch-yomi.mjs、横浜と同方式): 完全読み 98%(255/260)・machiaza_id 52%。丁目まとめ2件 (古市場1・2丁目・小倉1〜5丁目) は個別丁目へ展開。ken_all は cache/utf_ken_all.zip 手動配置 (README 参照)。"
  - 収集体制は4生活環境事業所。管轄は 川崎生活環境事業所=川崎区 / 中原=幸区・中原区 / 宮前=高津区・宮前区 / 多摩=多摩区・麻生区。
  - 祝日・大型連休・お盆も通常収集する。休みは日曜と 1/1〜1/3 のみ (12/31 は収集する。23区より年末が1日長い)。本データの overrides はこの 1/1〜1/3 のうち各コースの収集曜日に当たる日の休止のみ反映。
  - 小物金属・粗大ごみ (申込制) は年末年始が別ルールで、休止期間は年により変動し毎年12月に市が確定・告知する。2025年度実績は 12/27〜1/4 休止 (受付は 12/30 まで)。**12月に yearend_url で要確認・要更新**。本データの metal 規則には 1/1〜1/3 の休止のみ反映しており、12/27〜12/30・1/4 の追加休止は未反映 (この期間に monthly_nth が当たるコースは実際には収集されないことがある)。
  - 空き缶・ペットボトル・空きびん・使用済み乾電池は同日収集 (週1)。data では beverage_can/pet_bottle/glass_bottle/hazardous の4カテゴリが同日規則を持つ (hazardous=使用済み乾電池)。
  - 粗大ごみは事前申込制のため rules には含めない。公式表では小物金属と同日 (第n・n回目 曜) に掲載される。
  - "検証(2026-07-17): 一次ソース HTML 表 (全7区255町名) を機械変換。照合は各区のカバー PDF (kawasaki(R8)/saiwai(R8)/nakahara(8)/takatsumiyamae(R8)/tamaaso(8)) と実施。ただしこれらは Microsoft Print To PDF 製でテキスト層が無く (文字はベクタアウトライン)、pdftotext 不可・日本語 OCR 資産も無いため、PDF を画像化して目視転記した。PDF は HTML の町別行とは別レイアウトで、上表=週次パターンで町をグルーピング・下表=小物金属パターンで町をグルーピングした再ファクタ表現であり、独立照合になる。全255町中254町について週次4種 (普通/空き缶等/ミックス/プラ) の曜日と小物金属の第n週+曜日を突き合わせ、254/254 一致・不一致ゼロ。"
  - "照合で判明した唯一の差異: 宮前区「野川」が PDF カバー表 (上表・下表とも) に掲載漏れ。HTML には存在し、同一パターン町 (野川台・西野川・野川本町・南野川 = 普通月木/缶等火/ミックス水/プラ土/小物金属 第2・4金) と完全一致するため、HTML 準拠で course-miyamae-5 に収録済み。PDF 側の掲載漏れと判断 (データ側の誤りではない)。"
  - "**日付入り年間カレンダーは市が公開しておらず (ごみ分別アプリ内カレンダーのみ)、日付レベルの独立照合は不可**。上記照合は HTML×PDF の曜日・第n週一致までであり、実際の収集日 (祝日運用・年末年始の境界) はアプリ等で別途確認のこと。"
  - "確率的信頼度: HTML と PDF は別レイアウトの独立表現で、254町ゼロ不一致から片側性誤り (抽出・転記ミス、どちらか一方のソース誤り) の町あたり確率は 95% 信頼で <1.2% (rule of three)。照合で検出できない残余リスクは両表現共通の原簿誤りのみ。"
