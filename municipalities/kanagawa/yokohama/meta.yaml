code: "14100"
source:
  index_url: https://www.city.yokohama.lg.jp/kurashi/sumai-kurashi/gomi-recycle/gomi/
  # 一次ソース: 市公式「ごみと資源の収集曜日」(18区・五十音別 126 サブページの町名×曜日マトリクス表)。
  # 同日別袋品目の頻度は「市で収集するもの」各品目ページ (shushu/das11・das4・das10・das8) に明記。
  schedule_url: https://www.city.yokohama.lg.jp/kurashi/sumai-kurashi/gomi-recycle/gomi/shushuyobi/
  # 祝日運用 (祝日も通常収集・日曜のみ休み) の FAQ。年末年始の休止期間は毎年12月に市が告知 (広報よこはま12月号・市HP)。
  yearend_url: https://www.city.yokohama.lg.jp/faq/kukyoku/shigen/shigen-gyomu/20211020165625087.html
notes:
  - 政令指定都市 (2都市目)。コースは区ごとにグルーピングし course slug = <区romaji>-<n> (例 course-naka-3)。区romaji= 青葉:aoba / 旭:asahi / 泉:izumi / 磯子:isogo / 神奈川:kanagawa / 金沢:kanazawa / 港南:konan / 港北:kohoku / 栄:sakae / 瀬谷:seya / 都筑:tsuzuki / 鶴見:tsurumi / 戸塚:totsuka / 中:naka / 西:nishi / 保土ケ谷:hodogaya / 緑:midori / 南:minami。areas は町名単位に再設計済み (2026-07-24、areas.mjs): 公式表の町名セルが「今宿1・2丁目」「和泉町6500台」のように町名+丁目/番地範囲+注記を直結するため、複数丁目まとめ (290件) を個別丁目へ展開 (1,087→1,779 area)、半角括弧を全角化、「※…」の運用注記を note へ分離。yomi と machiaza_id はデジタル庁 ABR 町字マスター(フルセット)神奈川県版由来 (fetch-yomi.mjs): 丁目まで照合。ABR に無い広域大字 (戸塚町・和泉町・今宿町 等。ABR は住居表示ベースで包括大字を持たない) は日本郵便 郵便番号データ (ken_all、公式配布) の読みで補完する2ソース方式。結果 yomi 完全読み 1,724/1,779 行 (96.9%、残55行のみ初字フォールバック)・machiaza_id 1,004 行 (56%、ID は ABR 専用のため丁目照合できる行のみ)。ken_all zip は bot 対策でスクリプト直取得不可のため cache/utf_ken_all.zip に手動配置する運用 (fetch-yomi.mjs、未配置なら ABR のみで続行)。区をまたぐ同名町名 (吉田町=中区・戸塚区、川島町=旭区・保土ケ谷区) は「<町名>（<区名>）」で曖昧性解消。
  - 収集体系は全品目 weekly の3曜日スロット。燃やすごみ (週2) と同じ曜日に別袋で 燃えないごみ・電池類・スプレー缶、缶・びん・ペットボトル (週1) と同じ曜日に別袋で 小さな金属類、プラスチック資源 (週1) は独立の曜日。月次規則を持つ品目は無い。
  - 粗大ごみは事前申込制のため rules には含めない。古紙・古布は資源集団回収 (地域回収) で市の集積所収集ではないため対象外。
  - 祝日・大型連休も通常どおり収集する (市 FAQ)。休みは日曜と年末年始のみ。
  - 年末年始は毎年12月に市が確定・告知する (掲示板チラシ・広報よこはま12月号・市HP)。実績は 令和5年度=12/31(日)〜1/3(水)休止、令和7年度=12/31(水)〜1/4(日)休止で、日曜を除いた実効休止はいずれも 12/31〜1/3。本データは 2026年度も同運用と見て 12/31(木)・1/1(金)・1/2(土) のうち各コースの収集曜日に当たる日を cancelled として反映 (1/3 は日曜のため対象日なし)。**12月の市告知で要確認・要更新**。
  - 南区「平楽」は公式表に「南事務所にお問合せください。」とだけあり収集曜日が非公開のため収録対象外 (収録 1,087 行は平楽を除く全行)。
  - 栄区「上郷町1〜199の一部」は公式表に同一表記のまま 2 つの収集パターンで 2 行掲載されており、両方をそれぞれのコースに収録した。どちらに属するかは公式表でも判別できない (集積場所のシールで確認する運用)。
  - "検証(2026-07-20): 一次ソース HTML 表 (18区・126サブページ) を機械変換。(1) Node (node-html-parser、fetch.mjs 取得の cache) と Python (正規表現ベース、別途取得した HTML) の独立2実装・独立取得の2経路で全ページを抽出し、全 1,087 行 (町名×スケジュール) の完全一致を確認。全行がセル語彙4種 (燃やすごみ/缶・びん・ペットボトル/プラスチック資源/なし) の閉集合かつ 週2+1+1 の頻度構造に適合 (例外は平楽1行のみ)。(2) 青葉区は青葉事務所版「収集曜日一覧表(対象地域別)」画像 (パターン別グルーピングの別レイアウト再ファクタ表現、shokai/jimusho/aoba/info/index2.html) と目視照合し、全47町×6パターンが完全一致 (表記ゆれ 黒須田/黒須田町・市ヶ尾/市ケ尾 のみ)。区事務所版一覧を公開しているのは青葉区のみで他区は照合物なし。(3) 都筑区役所サイトの「月・金か火・土のいずれか週2回」記述と生成コースの燃やすごみパターンが完全整合。(4) 同日別袋 (燃えないごみ・電池類・スプレー缶=燃やすごみと同曜日、小さな金属類=缶・びん・ペットと同曜日) と頻度は「市で収集するもの」品目ページおよび市パンフレット「資源とごみの分け方・出し方」PDF の記述で二重確認。日付入り年間カレンダーは市が公開しておらず (ごみ分別アプリ内のみ)、日付レベルの独立照合は不可。"
