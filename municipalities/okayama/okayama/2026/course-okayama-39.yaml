metadata:
  city: okayama
  course: okayama-39
  course_name_ja: "岡山中央: 表町１丁目／表町２丁目／表町３丁目／田町１丁目／田町２丁目／中央町／磨屋町／中山下１丁目／中山下２丁目／平和町"
  areas:
    - name: 表町１丁目
      yomi: おもてちょう
    - name: 表町２丁目
      yomi: おもてちょう
      note: 内山下元町５丁目町内会の資源化物は２・４火（４火は当面古紙古布ペットボトルのみ)、内山下元町４丁目町内会の４金は当面古紙古布ペットボトルのみ
    - name: 表町３丁目
      yomi: おもてちょう
      note: 天瀬本町互助会の資源化物は１・３水、西中山下中心町町内会と新西大寺町町内会と千日前町内会の４金は当面古紙古布ペットボトルのみ、大雲寺町民生会の２金は当面古紙古布ペットボトルのみ
    - name: 田町１丁目
      yomi: たまち
      note: 田町寺之内町内会の２回目の金曜日および田町西町内会と東田町中通町町内会の４回目の金曜日は当面古紙古布ペットボトルのみ
    - name: 田町２丁目
      yomi: たまち
      note: 田町寺之内町内会の２回目の金曜日および仁王会と常盤会と田町西町内会と東田町中通町町内会の４回目の金曜日は当面古紙古布ペットボトルのみ
    - name: 中央町
      yomi: ちゅうおうちょう
      note: 中央町三番街町内会の２金は当面古紙古布ペットボトルのみ
    - name: 磨屋町
      yomi: とぎやちょう
      note: 磨屋町町内会の資源化物は２回とも当面古紙古布ペットボトルのみ、東田町本通親交会の４金は当面古紙古布ペットボトルのみ
    - name: 中山下１丁目
      yomi: なかさんげ
      note: 東中山下北部町内会と西中山下楠町町内会の４金は当面古紙古布ペットボトルのみ
    - name: 中山下２丁目
      yomi: なかさんげ
      note: 西中山下中心町町内会と東中山下四丁目町内会の４金は当面古紙古布ペットボトルのみ
    - name: 平和町
      yomi: へいわちょう
      note: 平和町北部町内会と平和町南部町内会と野殿町町内会と東田町本通親交会の４金は当面古紙古布ペットボトルのみ
  year: 2026
  fiscal_year_ja: 令和8年度
  source:
