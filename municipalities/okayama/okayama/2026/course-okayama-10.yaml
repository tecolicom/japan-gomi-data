metadata:
  city: okayama
  course: okayama-10
  course_name_ja: "岡南: 旭本町／岡南町１丁目／岡南町２丁目／七日市西町／七日市東町 ｜ 清輝･岡南: 旭町／二日市町 ｜ 清輝: 天瀬／天瀬南町／岡町／京町／下内田町／新道／清輝橋１丁目／清輝橋２丁目／清輝橋３丁目／清輝橋４丁目／清輝本町／船頭町／東中央町／南中央町／山科町 ｜ 桃丘: 佐山／芳賀佐山団地 （※）"
  areas:
    - name: 旭本町
      yomi: あさひほんまち
      note: ３水は当面古紙古布ペットボトルのみ
    - name: 旭町
      yomi: あさひまち
      note: 北旭町町内会の３水は当面古紙古布ペットボトルのみ
    - name: 天瀬
      yomi: あませ
      note: 天瀬共和会と天瀬あやめ町内会の３水は当面古紙古布ペットボトルのみ
    - name: 天瀬南町
      yomi: あませみなみまち
      note: 油町町内会と小原町東部町内会と児島町町内会の３水は当面古紙古布ペットボトルのみ
    - name: 岡町
      yomi: おかまち
      note: 内田西本町町内会の１水は当面古紙古布ペットボトルのみ
    - name: 京町
      yomi: きょうまち
      note: 瀬尾町内会の３水は当面古紙古布ペットボトルのみ
    - name: 岡南町１丁目
      yomi: こうなんちょう
      note: 北旭町町内会の３水は当面古紙古布ペットボトルのみ
    - name: 岡南町２丁目
      yomi: こうなんちょう
    - name: 佐山
      yomi: さやま
      note: (E69ステーション利用地区以外)
    - name: 下内田町
      yomi: しもうちだちょう
    - name: 新道
      yomi: しんみち
      note: 新道町内会と下内田北部町内会の３回目の水曜日は当面古紙古布ペットボトルのみ、清輝橋東通り町内会の１回目の水曜日は当面古紙古布ペットボトルのみ
    - name: 清輝橋１丁目
      yomi: せいきばし
      note: 清輝橋町内会の３水は当面古紙古布ペットボトルのみ、内田西本町町内会と小原町西部町内会の１水は当面古紙古布ペットボトルのみ
    - name: 清輝橋２丁目
      yomi: せいきばし
      note: 清輝橋町内会の３水は当面古紙古布ペットボトルのみ
    - name: 清輝橋３丁目
      yomi: せいきばし
    - name: 清輝橋４丁目
      yomi: せいきばし
      note: 小原町西部町内会の１水は当面古紙古布ペットボトルのみ
    - name: 清輝本町
      yomi: せいきほんまち
      note: 小原町西部町内会の１水は当面古紙古布ペットボトルのみ、東小野田町町内会と瀬尾町内会の３水は当面古紙古布ペットボトルのみ、ライオンズマンション岡山医大東第２の資源化物は１水のみ
    - name: 船頭町
      yomi: せんどうちょう
      note: 下内田北部町内会の３回目の水曜日は当面古紙古布ペットボトルのみ
    - name: 七日市西町
      yomi: なのかいちにしまち
      note: 資源化物は当面の間３回目の水曜日のみ
    - name: 七日市東町
      yomi: なのかいちひがしまち
    - name: 芳賀佐山団地 （※）
      note: 県住芳賀佐山団地・佐山団地・芳賀団地・芳賀団地南 （※）芳賀佐山団地は町名ではありません
    - name: 東中央町
      yomi: ひがしちゅうおうちょう
      note: 東中央町町内会と桜町町内会と尾上町町内会の３水は当面古紙古布ペットボトルのみ
    - name: 二日市町
      yomi: ふつかいちまち
      note: 二日市新生会と下内田北部町内会と下内田南部町内会の３水は当面古紙古布ペットボトルのみ、二日市東通町内会の１水は当面古紙古布ペットボトルのみ
    - name: 南中央町
      yomi: みなみちゅうおうちょう
      note: 瓦町町内会の資源化物は２・４金、桜町町内会と尾上町町内会の３水は当面古紙古布ペットボトルのみ
    - name: 山科町
      yomi: やましなちょう
      note: ３水は当面古紙古布ペットボトルのみ
