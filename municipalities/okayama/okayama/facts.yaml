# 岡山市の読み物断片 (facts)。事実と出典に基づく。文体: です・ます調、2〜4 文。
facts:
  - id: weekday-only-collection
    title: 収集があるのは平日だけ、祝日はある
    body: >-
      岡山市のごみ収集は土曜・日曜が完全に休みで、平日だけ行われます。
      いっぽう祝日や振替休日は通常どおり収集があります。「祝日も土日も収集する」横浜市や川崎市とは
      逆の組み合わせで、地域によって当たり前が違うところです。
    tags: [祝日運用, 収集頻度]
    sources:
      - https://www.city.okayama.jp/faq/faq_detail.php?frmId=319
  - id: shigenkabutsu-six-items
    title: 「資源化物」は 6 品目を同じ日にまとめて回収
    body: >-
      岡山市の「資源化物」は、ガラスびん・空き缶・スプレー缶・ペットボトル・古紙・古布の
      6 品目をひとつの収集日にまとめて出す区分です。月 2 回の資源化物の日に何でも出せる代わり、
      品目ごとの個別の日はありません。スプレー缶を缶と同じ日に出せるのも特徴です。
    tags: [資源の中身, 分別体系]
    sources:
      - https://www.city.okayama.jp/kurashi/0000005214.html
  - id: road-split-towns
    title: 同じ町でも道路や線路の向こうは別の収集日
    body: >-
      岡山市では、同じ町名でも「砂川以東と以西」「旧国道 53 号線の東西」「JR 瀬戸大橋線の東西」の
      ように、道路や線路を境に収集日が分かれる町が 58 あります。
      市の収集曜日一覧にも境界の説明がそのまま書かれており、引っ越し先が境界のそばなら要確認です。
    tags: [町内の違い, 境界線]
    sources:
      - https://www.city.okayama.jp/kurashi/category/1-12-7-10-3-0-0-0-0-0.html
  - id: aoe-six-chome
    title: 青江は五丁目までが北区、六丁目だけ南区
    body: >-
      岡山市の青江一〜五丁目は北区ですが、青江六丁目だけは南区に属します。
      行政区が違えばごみの収集コースも別で、同じ「青江」でも六丁目だけ収集日が異なります。
      政令指定都市ならではの、町名と区割りのねじれです。
    tags: [区割り, 同名地名]
    sources:
      - municipalities/okayama/okayama/meta.yaml
      - https://catalog.registries.digital.go.jp (アドレス・ベース・レジストリ)
  - id: inujima-island
    title: 島の犬島はプラスチックが週 2 回
    body: >-
      瀬戸内海に浮かぶ犬島 (東区) では、プラスチック資源の収集が月曜と木曜の週 2 回あります。
      市の中心部ではプラは週 1 回なので、島のほうが多い品目がある形です。
      船で運ぶ島の収集は、本土と同じにはできない事情がうかがえます。
    tags: [島の収集, 収集頻度]
    sources:
      - https://www.city.okayama.jp/kurashi/category/1-12-7-10-3-0-0-0-0-0.html
  - id: transition-stations
    title: びん・缶をまだ出せないごみステーションがある
    body: >-
      資源化物の収集は 6 品目一括が原則ですが、一部の町内会のステーションでは移行期のため
      「当面、古紙・古布・ペットボトルのみ」という運用が続いています。
      同じ町でもステーションによって出せる品目が違うことがあり、市の一覧表の備考に明記されています。
    tags: [移行期, 町内の違い]
    sources:
      - https://www.city.okayama.jp/kurashi/category/1-12-7-10-3-0-0-0-0-0.html
