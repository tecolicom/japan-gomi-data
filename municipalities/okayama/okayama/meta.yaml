handle: okayama
name_ja: 岡山市
region_ja: 岡山県
code: "33100"
source:
  # 市公式のごみ・リサイクル「収集曜日一覧」案内ページ
  index_url: https://www.city.okayama.jp/kurashi/category/1-12-7-10-3-0-0-0-0-0.html
  # 通常収集日程の一次ソース (市公式 kViewer=kintone公開ビューの records API。tools/api-extractor/okayama)
  schedule_url: https://f5d44204.viewer.kintoneapp.com/public/bba750ccc0622ed0ea1ee9803b60537753367b11af275de1ad0d1507c414d779
notes:
  - "政令指定都市。一次ソースは市公式「令和6年3月からの収集曜日一覧表」= kViewer (Cybozu kintone の公開ビュー)。市サイト直下に地区別の PDF/CSV/HTML 表は無く、これが唯一の公開一覧。records API から全844行(小学校区×町名)を機械取得した(tools/api-extractor/okayama/fetch.mjs)。"
  - "取得プロトコル(2026-07-22 確立): (1)POST wr-api/assign_request_order で requestId、(2)POST wr-api/generate_token で JWT(60秒有効。requestId 反映まで数百ms要るのでポーリング)、(3)GET /public/<code> で Cookie セッション確立、(4)GET /public/internal/api/records/<code>/<page> を20件/ページで取得。待合室(waitingRoomEnabled)は現在無効。混雑で /waiting/ 誘導・token失敗時は fetch.mjs が明示中断する。ページ間300ms間隔(accessLimitPerMinute=300 内)。"
  - "収集区分は 可燃ごみ / 不燃ごみ / 資源化物 / プラスチック資源 の4系統。可燃・プラ資源は weekly、不燃・資源化物は monthly_nth(その月 n 回目の該当曜日、第n週ではない)。"
  - "資源化物の構成品目(市公式 https://www.city.okayama.jp/kurashi/0000005214.html で裏取り): ガラスびん・空き缶・スプレー缶・ペットボトル・古紙・古布 を同一収集日に一括で出す(月2回)。taxonomy で glass_bottle+beverage_can+spray_can+pet_bottle+paper+cloth の同日収集(days 共有)へ分解した。スプレー缶は「空き缶と同区分」だが容器(青/緑コンテナ)が分かれ市公式が別品目として明記するため spray_can を別カテゴリで収録。"
  - "移行期の例外: 一部町内会・一部回で資源化物が「当面古紙古布ペットボトルのみ」(=びん・缶・スプレー缶を除く)の記載が備考にある(294行が備考持ち、大半は町内会境界や時間指定)。恒常規則としては全6品目の同日収集を採用し、町内会単位の移行例外・資源化物日の個別上書き(例『内山下元町4丁目町内会の資源化物は2・4金』)は規則としては構造化せず、該当行の areas[].note に備考原文を保持した(粒度が町内会級で権威ある地区割ソースが無いため。推測で分解しない)。"
  - "地区割れ(同一町名の複数行 58町・140行): 備考の地理的区分(『旧国道53号線以西』『JR山陽本線以北』『N番地〜M番地』等)や町内会列挙で区別される。area の name は町名のまま重複を許し、どの行かの判別は areas[].note (備考原文) が担う。"
  - "コース設計: 4フィールドの日程シグネチャで市全域を畳み 81 コース(course slug=okayama-<n>)。ソースの地区単位は小学校区(121区)だが、政令市の4行政区(北・中・東・南)への小学校区対応表が公開に無いため区別 slug は付けず、小学校区と町名は course_name_ja (学区: 町名列挙、備考なし) に保持した。areas は {name(町名), note(備考原文・任意)} で構造化 (2026-07-22 に schema の areas を name のみ必須へ拡張)。yomi はデジタル庁アドレス・ベース・レジストリ (ABR) 町字マスター岡山県版 (data.address-br.digital.go.jp、政府標準利用規約) の大字・町名カナをひらがな化して付与 (2026-07-23、841/844行・99.6%)。ベース町名 (丁目・区注記・記号サフィクス除去) で引き、ひらがな町名 (さい) は表記=読みとして自身を採用。未付与3行 (さい東町一・二丁目=ABR側に無い、芳賀佐山団地=町字外の団地名) は推測せず yomi 無しのまま。"
  - "ライセンス: kViewer 配信の市公式データ(kintone 公開ビュー。ライセンス宣言なし=unknown)。収集曜日という事実データの抽出として収録(練馬・杉並・倉敷と同じ整理)。kViewer は Cybozu の商用インフラだが配信元は市自身の公開アプリ。"
  - "運用ルール: 祝日・振替休日も通常収集、休みは土曜・日曜・年末年始(FAQ frmId=319 / 資源化物ページ『祝日も含む』)。資源化物は朝8時まで、可燃・一部地区は朝7時30分までの時間指定が備考にある。"
  - "年末年始は複数年実績で不変の部分のみ overrides に反映 (2026-07-22): 市告知ページ (kurashi/0000005242、毎年12月頃公開・年明けに404化。Wayback で令和2・4・5年度を確認) は 令和2年度=年末12/29(火)まで・年始1/4(月)から、令和4年度=年末12/30(金)まで・年始1/4(水)から、令和5年度=年末12/29(金)まで・年始1/4(木)から。共通する不変部分は **12/31〜1/3 休止・1/4 再開** で、これを反映した (2026年度の実効休止日は 12/31木・1/1金のみ。1/2土・1/3日は元々収集なし、12/31 は第5木曜のため monthly_nth 非該当)。**12/30 は年により収集の有無が変わるため未反映**。また市は「収集日を変更する一部地域には別途回覧」+「年末年始収集日変更一覧」PDF (住所50音順) を毎年出しており、休止日に当たる地区の振替が発生する — 12月に同ページで変更一覧を確認して overrides を確定させること。"
  - "年末年始: 毎年12月に別途告知の運用(december-announce。専用ページ kurashi/0000005242 は 2026-07-21 時点404)。実日付が未公開のため cancelled override は作っていない(推測で作らない)。12月告知が出たら overrides を追加のこと。"
  - "year=2026 / 令和8年度は展開・照合上の名目値。規則自体は『令和6年3月からの収集曜日』= 暦年・年度に依存しない恒常規則。"
  - "records の id は 1〜868 で欠番24(kintone の削除痕。ユニーク844)。totalCount=844 と一致。"
  - "検証(2026-07-22): (1)独立2取得 — fetch.mjs の records API 取得と、別経路(ブラウザUI表示からの独立取得 cache/browser-records.json)を全844行×8フィールド突合、不一致0。(2)パース独立2実装 — JS(parse.mjs, 逐次トークナイズ)と Python(verify_parse.py, 別実装)で全844行×4フィールド=3376署名を突合、不一致0。(3)畳み込み+展開整合 — 全844行を rules 化しシグネチャで81コースへ写像、各コースを FY2026 通年展開して元行の weekly/第n パターンを完全再現、不一致0。表記の異体(『2水・4水』≡『2.4水』、『1火.3金』≡『1火・3金』等)は正規化され 85 の生シグネチャが 81 コースへ収斂。"
  - "確率的信頼度: 独立誤り単位=生の日程シグネチャ 85 個(4フィールド語彙は可燃2・不燃18・資源化物32・プラ6=全数調査済、想定外表記は throw で0)。2実装パース・2経路取得・展開整合がすべて不一致0。原簿(市の内部データ)の独立照合は kViewer が唯一の公開のため不可 → 鯖江と同様『未検証』扱い(検出できない残余リスクは kViewer 表現と原簿が共有する誤りのみ)。日付入り年間カレンダーも市非公開のため日付レベル照合は不可、粒度は曜日+第n まで。等級=②相当(2実装・2取得で表現内は堅牢、原簿照合のみ不可)。"
