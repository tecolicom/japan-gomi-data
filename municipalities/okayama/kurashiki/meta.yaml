notes:
  - "一次ソース: 倉敷市公式「各地区収集日一覧」ページ配下の地区別PDF 6枚(kurashiki/mizushima/tamashimafunao/kojima/funao/mabi。tamashimafunao は玉島+船穂を同梱、船穂は funao.pdf にも同内容で重複)。いずれもテキスト層が健全な罫線グリッド表で、pdfplumber の cell 幾何(縦マージセルは None→上方向フィル)で機械抽出した。収集曜日の日付入り通年カレンダー(暦)は公開されておらず、粒度は曜日+第n回目まで。"
  - "ライセンス: 一次PDFは市サイト(CC等の宣言なし。Copyright Kurashiki City)。収集日という事実データの抽出として収録(練馬・杉並・所沢と同じ整理)。検証補助に用いた data eye オープンデータ「倉敷市_平成31年度_ごみ_地区別_収集日」CSV(resource 4110、UTF-8/BOM、249行、5374アプリ対応)はライセンス「その他(オープンライセンス)」。"
  - "収録単位: 収集は6つの環境センター管区(倉敷/水島/玉島/児島/船穂/真備)に分かれ、各管区内の学区→地区(町内会)ごとに日程が異なる。同一日程の地区を管区内で畳んで 83 コース(倉敷24/水島16/玉島17/児島16/船穂4/真備6)に集約。course_name_ja は「<管区>地区: (学区ごとに)ベース町名列挙」の人間可読サマリ(丁目番号・番地・旧呼称は含めない)。"
  - "areas = 1 町名 (丁目単位) へ再設計 (2026-07-23。旧: PDF「地区」セル原文を name にした列挙塊)。PDF の地名列挙を tools/pdf-extractor/kurashiki/areas.mjs で機械分解する。分解規約 (詳細は同 README「area 分解規約」): 括弧外の ・/，/半角, を区切りに参照へ分割 → 数字始まりは直前町の丁目/番地継続・日本語始まりは新町 / 丁目 (N丁目・裸N<100・N～M丁目・N丁目～M丁目) は個別丁目へ展開し独立 area / 番地・号・番地レンジ・道路河川境界条件 (「◯◯線より東」「以南」)・「◯◯を除く/のみ/の一部」・字/町内会補足・前置グループラベル (Ｒ2南・ＪＲ南 等)・旧呼称 (kyu) は展開せず note に保持 / 括弧 （…） は直前トークンの note / 東西X・南北X は実在公式町名 (東X+西X・南X+北X) へ展開 / 想定外表記は throw。125 行 → 491 area (同一 name+note 重複除去後 474)。対応表は cache/area_expansion.json。yomi は ABR に無い難読地名について、市公式 PDF 自身が振る読み括弧「地名（ひらがな）」(宇頭間（うとうま）・美野団地（みのだんち）等 13 地名) を第2の権威ソースとして採用する (市自身の表記であり推測ではない)。読み括弧は yomi へ取り込んだ上で name/note から除去する。割れ area (同一 name が別条件で複数コースに存在) は note の判別子を name に昇格し「町名（判別子）」とする (岡山と同規則。例 北畝2丁目（古城池線以北）・浦田（県道福田老松線より東）)。茶屋町学区の対行 (茶屋町・早沖のＪＲ東/西割り) は末尾括弧が行全体に係る旨を原文 PDF で確認し明示裁定 (areas.mjs ROW_WIDE_PAREN)。黒崎 (中庄/玉島)・服部 (真備/玉島) は同名の別地名で、name は原文のまま管区と machiaza_id で区別する。"
  - "yomi・machiaza_id = デジタル庁 ABR (アドレス・ベース・レジストリ) 倉敷市町字マスター (mt_town_city332020、大字・町名カナ・丁目番号・machiaza_id) 由来 (fetch-yomi.mjs → cache/abr-town.json)。ベース町名+丁目番号で照合し、丁目まで一致する町字行の machiaza_id (332020-<7桁>) と yomi を引く (丁目行が無ければ大字行)。ABR は管区/大字接頭辞つき (玉島服部・児島唐琴・水島高砂町・真備町箭田・茶屋町早沖・連島町亀島新田) や 町 サフィクス (老松→老松町)・通り→通・の→之 の表記ゆれが多く、管区別接頭辞候補+異形で照合し、接頭辞ぶんの読みは表示名に合わせ除去 (玉島服部=たましまはっとり → name 服部 / yomi はっとり。岡山「岩井1丁目→いわい」と同じく文脈接辞は yomi に含めない)。引けない町名 (町内会・字・未登録埋立地名) は yomi/machiaza_id 無し (推測でカナ・ID を作らない)。yomi 付与率 95.1% (491 中 ABR 466・ひらがな自明 1・未付与 24)。machiaza_id 付与率 93.5% (459/491、ABR 行が一意な時のみ。丁目無し参照の丁目登録町 天城台・中央 等は一意化不能で yomi のみ)。未付与例: 緑の里・別府・観音台・城・美野団地・金浜。ABR は政府標準利用規約 (CC BY 4.0 互換)。"
  - "note の方針: PDF「地区」セル由来の地理的区別子・限定条件のみ (番地・道路河川境界・「◯◯を除く」・旧呼称・字/町内会補足)。岡山で導入の案内文除去 (「朝7時30分までに…」「〜ご確認ください」等) 規約は、倉敷の一次ソースに運用文が含まれず該当ゼロ (除去対象なし)。将来 note に案内文が混入したら岡山 stripTimeNote 同型の除去を追加すること。"
  - "種別マッピング(taxonomy.yaml と一致、語彙追加なし): 真備以外5地区は 燃やせるごみ=burnable(週2曜日、遠隔の玉島・弥高のみ月2の第2・4水)/ 資源ごみ(月1・第n回目、市の分別定義どおり びん=glass_bottle・缶=beverage_can・ペットボトル=pet_bottle・古紙=paper・古布=cloth を同一日に一括収集するので5カテゴリの同日収集に分解)/ 埋立ごみ=non_burnable。真備地区は 燃えるごみ=burnable / 燃えないごみ=non_burnable / 資源[ペットボトル・白色トレイ・古布]=pet_bottle+plastic+cloth / 資源[缶]=beverage_can / 資源[びん・古紙]=glass_bottle+paper / 有害[廃体温計・乾電池]=hazardous。non_burnable のラベルは多数派の「埋立ごみ」を採用(真備の呼称は「燃えないごみ」)。plastic は真備の白色トレイ専用。"
  - "第n表記: 「N・曜日」は「その月 N 回目の該当曜日」(第N週ではない)。倉敷CSV(検証用)は「曜日N」の順で同義。"
  - "粗大ごみ: 持込(環境センター)または戸別収集(粗大ごみ受付センター 435-5300)で有料・集積所対象外 → rules 非対象。使用済乾電池は集積所の専用容器へ随時で固有の収集日を持たない → rules 非対象(taxonomy の hazardous は真備の有害ごみ収集のみ)。古紙・古布は5地区では資源ごみに含めて月1収集(集団回収ではない)。"
  - "年末年始: 真備PDFに「年末年始の休業日は事前に広報紙を通じてお知らせします」と明記(december-announcement 型)。他5地区のPDF・FAQ・コールセンターにも実日付の年末年始休止は未記載。12月広報待ちのため cancelled override は作っていない(推測で作らない)。祝日・お盆の収集有無も一次ソースに明記が無く未確認(要照会)。course は恒常的な曜日/第n スケジュールで、year=2026 は展開・照合上の名目値(暦年・年度に依存しない)。"
  - "検証(2026-07-21): (1)自己照合 — 83コースを categoriesOn で FY2026 通年再展開し、各コースの weekly/第n が抽出レコードのパターンを完全再現(不一致ゼロ、パース忠実性)。(2)独立ソース照合 — data eye 平成31年度 地区別収集日CSV(別発行・別年度・別グルーピング)と曜日/第n を突合。distinct スケジュールパターン集合で 水島 16/16・玉島(船穂含む) 20/20・児島 16/16 が完全一致、倉敷 22/24。アンカー照合は 189地区行が一致。(3)エンジン非依存 — CSV非対象の真備・船穂を pdftotext -layout(別アルゴリズム)で再抽出し pdfplumber と distinct パターン集合が完全一致(真備6/6・船穂4/4)。"
  - "倉敷の残差2件(いずれも現行PDFが正・抽出は原文忠実、raw PDF で確認済み): 中島(※)学区の資源収集が2019年の月曜(第1・第3月)から現行の水曜(第1・第2水)へ変更(この学区はPDFに「※必ず倉敷環境センターへ確認」と明示され変更含み)。および大高/万寿で2019CSVと現行PDFの資源第n回目のグルーピング境界が相違(同一町の割当が更新)。data eye CSV は2019年度で一部が旧日程のため、現行PDFを一次として採用した。"
  - "検証等級: ②独立ソース(data eye CSV)との曜日/第n レベル照合(5地区、日付レベル照合は不可=市に日付入りカレンダー非公開) + 真備・船穂はエンジン非依存で担保。独立誤り単位は distinct スケジュールパターン(4地区で 76、うち完全一致 74)。検出できない残余は両表現共通原簿の誤りのみ。次年度はPDF再取得のこと。"
  - "既知の注意: (1)玉島/児島PDFの「旧呼称」列は収集ゾーン識別に使うが収録スケジュールには不使用(児島の旧呼称にはカナ furigana が併記される)。(2)玉島に同一(地区,旧呼称)で燃やせる曜日が異なる行が存在(八島/玉島中央北・島地)= ソース側の区別基準(ごみステーション)による。原文どおり別コースに保持。(3)ごみ分別アプリ「さんあ〜る」は第三者商用アプリのため一次ソースに採らない。"
