source:
  # 区公式「ごみ・資源収集日一覧」(五十音別 7 ページ)。現行の正 (下記 CSV の鮮度ガードに使用)
  index_url: https://www.city.shinagawa.tokyo.jp/PC/kankyo/kankyo-gomi/gomi-kateigomi/wastedayslist/index.html
  # 一次ソース: jig.jp ODP (オープンデータプラットフォーム) の縦持ち CSV (cp932)。CC BY 4.0。
  # 1 行 = 分類 × 地区。同一データの RDF/XML 表現 (同ディレクトリの gomisyusyubi.rdf) が独立検証源。
  schedule_url: http://www.city.shinagawa.tokyo.jp/ct/other000081600/gomisyusyubi.csv
  # 年末年始の確定情報は毎年 11 月下旬にこの固定 URL が更新される (令和8年度分は 2026年11月頃)
  yearend_url: https://www.city.shinagawa.tokyo.jp/PC/20221124152435.html
notes:
  - 収集区分は 3 つ (燃やすごみ 週2回 / 陶器・ガラス・金属ごみ 月2回 / 資源 週1回)。粗大ごみは事前申込制・有料のため対象外。
  - "「資源」は資源プラスチック・ペットボトル・びん・缶・古紙・蛍光灯電池類を同一曜日に資源回収ステーションで回収する区の呼称。taxonomy では 6 カテゴリに分解し days を共有させている (同日収集)。資源プラスチック (製品プラスチック + プラスチック製容器包装) は令和6年4月から全域で本格実施され、独立した収集曜日は持たず資源の日に出す。"
  - 古着・古布は「資源」に出せず拠点回収 (毎月第2・4土曜 午前10時〜正午、雨天・祝日も実施、区内一律) の対象のため本データに含まない。集団回収 (町会・自治会等の自主活動) も区収集とは別枠で対象外。
  - "祝日も通常どおり収集する。ODP CSV/RDF の全 411 行で「祝日の収集」列が ○ (RDF では odp:isCollectToPublicHoliday=true)。区公式サイトに祝日収集を明記した文章は見当たらないが、令和8年版ごみリサイクルカレンダーが陶器・ガラス・金属ごみ「第2・4月曜」地区の年始最初の収集日を 1月12日 (成人の日) と記載しており、祝日を収集日として扱っていることと整合する。"
  - "「第n・第m<曜日>」は「その月 n 回目の該当曜日」(第n週ではない)。区も「5回目の曜日の収集はありません」と明記しており occurrences は 1〜4 のみ出現する。"
  - "年末年始は複数年実績で不変の部分のみ overrides に反映 (2026-07-21): 令和2年度 (12/31〜1/3 全休)・令和6年度 (資源 12/31〜1/3・燃やすごみ 1/1〜1/3 休止)・令和7年度 (資源 12/31〜、全品目 1/1〜1/4 休止。12/31 は水・土曜地区の燃やすごみを臨時収集) の区告知に共通する (1) 1/1〜1/3 全品目休止、(2) 資源の 12/31 休止、を反映した。2026-12-31 は第5木曜のため陶器・ガラス・金属ごみは非該当、木曜資源のコースに木曜燃やすごみは無く (build 時に検査)、12/31 は日単位 cancelled で正確。**燃やすごみの 12/31 (収集する年と休む年がある) と臨時収集 (振替) は年により変動するため未反映** — 令和8年度分は例年 11 月下旬に yearend_url が更新されるので、2026年12月に確認して overrides を確定させること。"
  - "検証(2026-07-20): 独立 3 経路で突合し不一致 0。(1) ODP CSV (日本語ラベル「第2木・第4木」を解釈) と ODP RDF (語彙 URI odp:1.0#SecondThursday を解釈) を別実装でパースし全 411 行 (137地区×3分類) の日程・祝日収集フラグが完全一致。(2) 区公式「ごみ・資源収集日一覧」HTML 7 ページ (129 町丁目 = 137 地区) と全突合し、不一致 1 件を検出 → 下記のとおり公式 HTML 側を採用。(3) 生成した 36 コースの course YAML を _lib とは別実装の素朴な日次ループで展開し、一次ソースの規則から直接組んだ期待日程と全 137 地区 × 令和8年度通年 (収集日枠 24,657 件) で照合、不一致 0。"
  - "ODP 側の既知の誤り (1件): 大井6丁目の燃やすごみが「第1月・第3月」となっているが、これは同地区の陶器・ガラス・金属ごみの値の複写。区公式「収集日一覧」は火曜日・金曜日で、隣接する大井5・7丁目も火・金。全 137 地区で燃やすごみが月2回になるのはこの 1 件のみ。より新しく権威のある公式 HTML 側 (火・金) を採用した (ODP データセットは dcterms:modified 2015-06-03)。build.mjs の KNOWN_DIVERGENCES に明示し、ODP 側が変化したら中断するようにしてある。"
  - "確率的信頼度: N=411 行 (137地区×3分類) を、独立に編集・公開されている区公式 HTML 表と全数突合。検出 1 件・裁定済み・残存不一致 0。残余リスクは (a) ODP と公式 HTML の双方に共通する誤り (どちらも区の同一業務データ由来のため相関しうる)、(b) 年末年始の年変動部分 (燃やすごみの12/31・臨時収集) が未反映 (上記のとおり12月確定待ち)。等級 A- (全数機械照合済みだが、日付レベルの通年カレンダーとの照合は未実施 — 区の年間カレンダー PDF が画像ベースでテキスト抽出不可のため)。"
  - "分割地区 8 組 16 地区について、一次ソース (CSV) の地区名と区公式 HTML の番地表記の対応を機械的に確定済み (日程署名が両者で一意に対応するため)。うち 3 組は CSV 名が「（品川エリア）」「（荏原エリア）」で住民が自分の該当を判別できない: 西大井1丁目（荏原エリア）=4番28〜32号 / （品川エリア）=それ以外、西大井6丁目（荏原エリア）=1番 / （品川エリア）=1番以外、西品川1丁目（荏原エリア）=25・26・28〜30番 / （品川エリア）=それ以外。地区名は一次ソースの表記をそのまま採録している (対応表は tools/csv-extractor/shinagawa/cache/banchi-map.json)。番地ベースの名称へ改める余地あり。"
