region_ja: 東京都
code: "13118"
source:
  index_url: https://www.city.arakawa.tokyo.jp/portal/gomi/index.html
  # 一次ソース: 区ポータルからリンクされる収集日 CSV (cp932, 2,249行, 「地区,丁目,番地・号」単位)。
  # ファイル名の日付サフィックスが版を表す。2026-07-20 時点でポータル上の唯一のリンクが下記 (=最新)。
  schedule_url: https://www.city.arakawa.tokyo.jp/documents/41480/gomi_20251216.csv
  # 検証ソース兼 年末年始・祝日の運用告知: 公式「ごみ収集日・プラスチック回収日」(更新 2026-06-29)。
  # 住所レンジ単位のごみ3種別表 + 大規模集合住宅の物件別表 + 地域別カレンダー PDF へのリンクを持つ。
  yearend_url: https://www.city.arakawa.tokyo.jp/a025/recycle/shuushuubi/syusyubi.html
notes:
  - 祝日 (振替休日含む) も通常収集する。公式ページは「収集、回収日が祝日にあたる場合は、道路事情により収集、回収時間が早まる場合があります」と案内するのみで休止の記載は無い。休みは日曜と年末年始。
  - "年末年始はごみ系と資源系で休止幅が異なる (CSV 備考欄に明示)。ごみ・プラスチック (burnable/non_burnable/plastic) は 1/1〜1/3 の3日間、資源 (glass_bottle/beverage_can/paper/pet_bottle/paper_cloth) は 12/31〜1/3 の4日間。overrides はこの差を品目群ごとに反映している。"
  - "2026年度の 12/31 は「12月第5木曜」に当たるため、この日に収集がある 83 コースはすべて『ごみのみ』(66) か『資源のみ』(17) のいずれかに分かれ、同一日にごみと資源が重なるコースは 0 だった。結果として全 overrides が日単位の cancelled で表現でき、カテゴリ別 cancelled は使っていない。年度が変わり 12/31 の曜日・第n回目が変われば重なりが生じ得るので、その場合は overrides のカテゴリ別分岐 (build.mjs に実装済み) が働く。なお正典実装 tools/_lib/schedule.mjs の categoriesOn() は同日に cancelled が1件でもあると全カテゴリを落とすため、カテゴリ別 cancelled が実際に必要になった年度では正典側の解釈確認が要る。"
  - "「発泡スチロール製食品用トレイ」は正典語彙に対応種別が無い。区がペットボトルと同一列・同一日程で回収するため独立種別を立てず pet_bottle のラベル override で表現した (語彙追加なし)。詳細は taxonomy.yaml のコメント。"
  - "資源の一部セルは日程として展開できない表記のため rules から除外した (計 271 セル): 「個別」117 セル (大規模集合住宅の個別回収)、「お問い合わせください」66 セル、「不定期」4 セル、古布の空欄 64 セル。除外は資源系のみで、ごみ系 (燃やす/燃やさない/プラ) は全 2,249 行で日程が確定している。該当地区の資源回収日は区または管理組合への確認が必要。"
  - "未解決1 (区への照会推奨): CSV に「西尾久8丁目44番」が 2 行あり資源の日程が食い違う。1 行目 (びん缶古紙=第1・第3木/ペット=木/古布=第2・第4・第5木) は同丁目 11〜50番のうち 30番を除く全番地と同一パターン、2 行目 (火/金/金) は孤立。隣接番地との整合を優先して 1 行目を採用した (先勝ち)。build.mjs / verify.py の双方に既知リストとして登録済みで、CSV 更新でこの重複が変化したら失敗する。"
  - "未解決2 (区への照会推奨): 公式HTML表との照合で「南千住3丁目41番3~5号」「南千住3丁目41番6号」の 2 行が説明できない。両行は隣接する 41番1・2号 (水土/木) と 41番7号 (火金/水) の曜日組み合わせを入れ替えた日程で、大規模集合住宅の別表 30 物件のどれとも一致しない。別表が汐入地区の全物件を網羅していない可能性が高い。一次ソース (CSV) を正として出力している。"
  - "検証(2026-07-20): (1) 独立2実装による全行突合 — build.mjs/parse.mjs (Node + yaml パッケージ + tools/_lib) と verify.py (Python + csv + PyYAML + 独自の日程展開・正規表現パーサ) を共有コード無しで別々に書き、生成 YAML の area 名 (「南千住1丁目1〜13番」形式) を (地区,丁目,番地・号) へ逆写像したうえで CSV 全 2,248 行 (重複1行除外後) を突合。被覆は重複0・漏れ0、rules 一致 2,248/2,248、2026年度 365 日の通年展開も 2,248 行すべて一致 (不一致 0)。(2) 独立表現との照合 — 区公式HTML「ごみ収集日・プラスチック回収日」(更新 2026-06-29、CSV の 2025-12-16 版より新しいため鮮度ガードも兼ねる) の住所レンジ表 46 行を展開し、ごみ3種別について CSV 2,220 行を照合: 2,209 行一致、9 行は表から明示除外された大規模集合住宅で別表の物件日程と一致、2 行が未解決 (上記「未解決2」)。資源5種別を載せた独立表現は区サイトに見当たらず (地域別カレンダー PDF は存在するが本収録では未照合) = 資源側の第2表現は無し。(3) npm test (schema+語彙+整合) と npm run build:ics が通過。"
  - "確率的信頼度: 独立誤り単位 N=129 コース (2,248 番地行から畳み込み)。CSV→YAML は独立2実装で全数一致のため変換由来の誤りは実質排除でき、残余リスクは (a) 両実装が同じ日本語表記を同じく読み違える系統誤り、(b) CSV 自体の誤り、に限られる。(b) については公式HTML表との突合で ごみ3種別 2,220 行中の未解決が 2 行 = 0.09%、rule of three による上限は 3/2,220 ≒ 0.14%。資源5種別は独立表現が無いため未検証で、ここが最大の残余リスク (区の地域別カレンダー PDF との照合が今後の課題)。等級: ごみ系=A (二重ソース全数一致)、資源系=B (一次ソース単独・内部整合のみ)。"
  - "来年度更新: fetch.mjs がポータルから CSV リンクを自動抽出するので、ファイル名の日付が変わっていれば新版が取れる。build.mjs の YEAR / fiscal_year_ja / STOPPED_ON (年末年始の実日付) を更新し、fetch → node --test → build → verify.py → verify-html.mjs を再実行する。備考欄の年末年始文言が変わると build.mjs が throw する。"
