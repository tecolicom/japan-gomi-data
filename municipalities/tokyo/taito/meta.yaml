handle: taito
name_ja: 台東区
region_ja: 東京都
code: "13106"
source:
  index_url: https://www.city.taito.lg.jp/kurashi/gomi/wakekata/index.html
  # 一次ソース: 区オープンデータ「ごみ分別・収集一覧」内の CSV「地域別収集曜日一覧」(CC BY 4.0)。
  # 配布ページ: https://www.city.taito.lg.jp/kusei/online/opendata/koutu/gomibunbetuitiran.html
  schedule_url: https://www.city.taito.lg.jp/kusei/online/opendata/koutu/gomibunbetuitiran.files/tiikibetusyuusyuuyoubiitiran.csv
  # 年末年始の日程は毎年12月に「広報たいとう」と区 HP で告知される (令和8年度カレンダーに明記)
  yearend_url: https://www.city.taito.lg.jp/kurashi/gomi/keikaku/kakusyupanfuretto/R8gomidasikarennda-.html
notes:
  - 収集は「資源」「燃やすごみ」「燃やさないごみ」「プラスチック」の4区分。いずれも収集日当日の朝8時までに排出。
  - "「資源」は集積所で同日に回収する 古紙類 (新聞・雑誌雑がみ・段ボール・紙パック) と びん・缶・ペットボトル の総称。data では paper/glass_bottle/beverage_can/pet_bottle の4カテゴリが同一の曜日規則を持つ。"
  - "プラスチックは令和7年4月から区内全域で分別回収。区公式 (shigenjoho/plastics.html, 更新日2026-04-01) が「資源の曜日（当日朝8時まで）に出してください」と明記しているため資源と同一の曜日規則で収録した。ただし排出場所は資源集積所ではなく燃やすごみ・燃やさないごみと同じ場所。食品発泡トレイ・カップは令和7年3月末で資源コンテナ回収を終了しプラスチックへ移行。ペットボトル本体は引き続き資源 (緑コンテナ)。"
  - "燃やさないごみは月2回 (平成22年3月1日改正)。地域により「その月の1回目・3回目」と「2回目・4回目」がある。これは第n週ではなく月内の該当曜日の出現回数基準で、区の収集曜日一覧ページも「その月の1回目･3回目 の 燃やさないごみ の日」と表現している (monthly_nth と同義)。"
  - "年末年始は日程未確定のため overrides を作成していない。区の令和8年度カレンダーが「※年末年始は収集日を変更する場合があります。12月の広報たいとうや台東区ホームページなどでご確認ください」と明示しており、確定日程は12月告知。推測で休止日を置かず、12月に yearend_url から確認して追記すること。"
  - "祝日の扱いは区公式に明示的な記載を見つけられなかった。令和8年度カレンダーは例外として年末年始のみを注記しており祝日には注記が無い (=通常収集と読める) が、明文の根拠が無いため overrides は置いていない。要確認事項。"
  - "令和8年度カレンダー PDF に「〇は燃やさないごみ臨時収集日」の凡例があり、燃やさないごみの臨時収集日が年に数回存在する可能性がある。該当日は PDF の色チップ (図形) でのみ表現されテキスト層から機械抽出できなかったため未反映。要確認事項。"
  - 粗大ごみは申込制のため対象外。古着・古布・乾電池・蛍光灯・廃食油・小型家電等は区施設等での拠点回収 (集積所収集外) のため対象外。集団回収も対象外。
  - "令和8年7月から、リチウムイオン電池等の小型充電式電池を燃やさないごみの日に回収 (収集曜日そのものに変更なし)。"
  - "検証(2026-07-20): 独立3ソースで突合。(1) 一次ソースのオープンデータ CSV 39行 (令和4年3月公開) を丁目単位に展開した108町丁が、(2) 現行の公式 HTML 表「収集曜日（全体）」の全行と資源/燃やす/燃やさないの3種別すべてで一致 (不一致0件・CSV側の欠落0件・HTML側の欠落0件)。CSV は公開が古いが現行表と完全一致したため内容は現行と確認できた。さらに (3) 令和8年度「資源とごみ出しカレンダー」案内ページの地域別「整理番号」(1〜12) と、日程シグネチャによる畳み込み結果 12グループが1対1で完全対応した (区公式のコース分けと同一)。course 番号にはこの整理番号をそのまま採用している。表記ゆれ (CSV=丁目全列挙/HTML=「3から7丁目」の範囲表記、根岸行のみ区切りが読点) はパーサで正規化したうえで町丁集合として突合した。"
  - "確率的信頼度: N=39 (CSV行=独立した誤り単位) を全数突合し不一致0件。rule of three により行単位の誤り率上限は 3/39 ≒ 7.7% (95%)。ただし3ソース (OD CSV・公式HTML表・カレンダー整理番号) が独立に一致しているため実効的な残余リスクはこれより大幅に低い。残余リスクは曜日規則そのものではなく、(a) 年末年始の休止日未反映、(b) 燃やさないごみの臨時収集日未反映、(c) 祝日運用の明文根拠欠如 の3点に限定される。等級: A-。"
