source:
  index_url: https://www.city.suginami.tokyo.jp/kurashi/gomi/seisougomi/index.html
  # 一次ソース: 区公式サイトの収集曜日検索を駆動する CSV (garbage.csv、OD 宣言なし・実質公開データ)。
  # 収集曜日のオープンデータは無く、東京都カタログの杉並区は「集積所一覧」「分別方法一覧」のみ。
  schedule_url: https://www.city.suginami.tokyo.jp/documents/12125/garbage.csv
  # 年末年始の休止期間を変更する場合は 12 月に区広報・区 HP で告知。刊行物・収集カレンダーの窓口ページ。
  yearend_url: https://www.city.suginami.tokyo.jp/s104/715.html
notes:
  - 祝日 (振替休日含む)・お盆も通常収集する。休みは日曜と年末年始のみ。
  - 年末年始は 12/31〜1/3 を休止 (overrides に反映。地域別カレンダー PDF 全28枚の印字とも一致)。休止期間を変更する場合は 12 月に区広報・区 HP (yearend_url) で告知されるため、その際は要更新。
  - コース単位 = 地域別「収集カレンダー」PDF 番号 (/shared/garbage/<N>.pdf, N=1〜28)。複数の町丁目が同一 PDF を共有するため areas に列挙。course-<N> の N が PDF 番号。
  - 収集区分は 4 つ。可燃ごみ (週2) / 不燃ごみ (月2、第n=その月 n 回目の該当曜日。冊子表記「第2・4回目の水曜日=8〜14日・22〜28日の水曜日」) / 古紙・ペットボトル (週1同日、paper+pet_bottle) / びん・かん・資源プラスチック (週1同日、glass_bottle+beverage_can+plastic)。同日収集の種別は days 配列を共有する。
  - 2026年4月 (令和8年度) から「資源プラスチック」の収集を開始し、現行4区分になった。データは令和8年度版。
  - 粗大ごみは事前申込制・有料 (粗大ごみ受付センター) で本データの対象外。清掃事務所は杉並清掃事務所・方南支所の 2 管轄。区指定ごみ袋は無し。
  - "確率的信頼度: 一次 CSV と地域別カレンダー PDF 28 枚は独立表現で、日付レベル照合 (通年5785収集日=各パターンの曜日・第n週まで検証。曜日レベルの川崎より一段強い)。独立項目は course×種別の 112 パターンで、ゼロ不一致から片側性誤りは 95% 信頼で <2.7%/パターン (rule of three。日枠5785を N に取ると相関試行の過大評価になるためパターン単位で数える)。冊子 P.21 (第3の独立表現) も全52行一致。残余リスクは3表現共通の区原簿誤りのみ。日程値の不一致0件のためベイズ裁定は不要 (PDF の二重打ちグリフ・ラベル分解は印字層の癖で日程相違ではない)。検証等級は日付レベル独立照合 (中野と同等の最上位)。"
  - "検証(2026-07-17): [1] 生成 course YAML 28 本を地域別カレンダー PDF 全28枚 (日付入り月間カレンダー、令和8年度版) と通年機械照合 (2026-04-01〜2027-03-31、期待収集日 延べ5785日) し、全28コースで完全一致 (差分0)。PDF 側の罠は抽出器が吸収: 一部 PDF の月見出しグリフが二重打ち (12月ブロックが「1122」「月月」「DDeecceemmbbeerr」) のためグリフに依らずテンプレートのスロット位置から月を判定、月末セルでラベルが1文字ずつ分解される件は識別文字単位で判定、右端タブ数字はグリッド列外として除外。[2] 全地域版冊子 P.21「収集曜日一覧」(t2026zentiiki.pdf) と一次 CSV を突合し、全52行の曜日パターン (可燃/不燃第n・曜日/古紙ペット/びんかんプラ) が多重集合として完全一致。町名+丁目キーでも 50/52 行が一致し値差分0。残る2行 (和田1〜3丁目・高円寺南2〜4丁目) は冊子表の下端で町名が縦書き・セル境界がずれ pdfplumber がラベルを取りこぼすためキー整合できないが、曜日の値自体は一致し、該当コース (course-17・course-23) はカレンダー PDF 照合で通年一致を確認済み。"
