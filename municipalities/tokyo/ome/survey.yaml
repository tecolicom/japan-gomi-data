  東京都ODカタログ t132055 には分別方法一覧(t132055d0000000010)・ゴミ集積所一覧(t132055d0000000037)・リサイクルセンター一覧等があるが、 収集日程/収集曜日のCSV/JSONは存在せず(WebSearchで確認)。市オープンデータページ(soshiki/80/2094.html)にも収集日データ無し。
  実装は画像OCRか第三者サイト照合が必要 → difficulty 4。各 A-H PDF がどの町丁目かの対応表は 1182.html 本文の町名列挙(約42町)から要抽出。
