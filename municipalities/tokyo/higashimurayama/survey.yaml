notes: '公式カレンダー索引ページ 29gomi-calendar.html は通常UAのcurl/WebFetchで CloudFront 403 (WAF)。 ★実装ヒント: `-H "Referer: https://www.google.com/"`
  + Chrome UA を付けると HTML(200,44882B)・PDF(200,application/pdf,2968802B) とも取得成功。 索引HTMLから gomi_calender_2024*.pdf
  を16地区分抽出(honchou/kumegawachou/akitsu/aobachou/onta/megurita/misumi/noguchi/suwa/tamako/fujimi/hagiyamachou系/sakae1/sakae2/sakae3)。
  地区割は町丁目単位。honchou PDF を pdftotext するとテキスト層あり(35103文字)、収集曜日ルールが本文抽出可能: 容器包装プラ・ペット「月・木」, びん・かん「金曜日」, 丁目別で「第1水曜日/第2水曜日」「第2・4木曜日/第2・4水曜日」等。
  カレンダー本体は2024/10〜2025/9の月間グリッド(P6-11)で年末年始も明示。 オープンデータは東京都カタログ(catalog.data.metro.tokyo.lg.jp, CLI 403)経由の実体が opendata.metro.tokyo.lg.jp/higashimurayama/132136_higashimurayamashi_garbage_separate.csv
  (200, text/csv, 88267B, 830行) だが内容は品目→分別区分の一覧で収集曜日を含まない。集積所一覧CSVも存在するが日程ではない。収集曜日OD(CSV/JSON)は不在。 difficulty 4
  は「PDFテキスト層はあるが日付グリッドは画像、曜日ルール抽出は全16地区の個別処理が要る」ため。 ライセンスはPDF/カレンダーページに明示記載を確認できず unknown。'
