notes: '一次ソースは市公式サイト配布の年度版「くにたちごみの分け方・出し方カレンダー」全ページPDF(令和8年度版, 60ページ, 約11.7MB)。 pdffonts でBIZ-UDフォント等が uni=yes で埋め込み、pdftotext
  でテキスト層を良好に抽出できることを確認(curl取得成功)。 表紙・目次・一覧表・品目別出し方ページはテキスト抽出可。カレンダー本体(A地区7〜19ページ, B地区20〜32ページ)は 月別グリッドで「2026 Apr.
  / 日付 / 品目名」が実日付レベルで抽出できるため granularity=dates。ただしグリッドの セル位置対応(何日に何を出すか)の機械パースには相応の実装が必要なため difficulty=3(機械可読PDF)。
  地区はA(東・中・谷保・泉・青柳・石田・矢川)とB(富士見台・西・北)の2区分で、市HTMLページに 「A地区:可燃 月木/不燃 隔週火」「B地区:可燃 火金/不燃 隔週月」等の曜日ルールも明記されており検証に使える。
  カレンダーは令和8年4月〜令和9年3月をカバーし12月・1月ページに年末年始の実日付が載る想定のため yearend=calendar-explicit。 ライセンス: PDFに明示的なCCライセンス表記は未確認のため
  proprietary-site と判定(市著作物・国立市観光まちづくり協会編集)。 東京都オープンデータカタログには国立市の「ごみ分別」CSV/XLSXが存在するが品目→分別区分の対応表であり収集日程データではない。
  CLIからカタログ本体はCloudFront 403想定・未取得。収集日検索(kana.html)は品目の五十音索引であり町名別収集日一覧ではない。'
