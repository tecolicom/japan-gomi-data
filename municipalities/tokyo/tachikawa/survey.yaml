notes: "一次ソースはHTML「資源とごみの収集日」ページ (schedule_url)。CLI curl 200 で全取得可。\n市域を町丁目で4地区に区分し、地区ごとに曜日ルールをテキストで完全記載:\n  1地区=富士見/柴崎/錦/羽衣、2地区=曙/高松/栄、3地区=若葉/幸/柏、4地区=緑/泉/砂川/上砂/一番/西砂。\n\
  品目=燃やせるごみ/プラスチック/ペットボトル/びん/缶/雑誌本雑がみ/古布・新聞折込チラシ/有害・スプレー缶 等。\n各曜日「毎週」と「隔週」の別が明記される (例:1地区 月=毎週燃やせるごみ、金=毎週ペットボトル+隔週…)。\n\
  ただし隔週(第何週かの確定)は月次カレンダーPDFに依存するため granularity は weekday-rules とし、\n隔週の週確定・年末年始は calendar_urls の月次PDF (_res/.../8calendar-Ntiku*gatu.pdf)\
  \ で解決する必要あり。\n年末年始: 月次カレンダーに「12月29日～1月3日」休止が明記 → calendar-explicit。\n収集曜日そのもののオープンデータ CSV/JSON は発見できず (opendataの立川リソースは品目辞典\
  \ garbage_separate.csv のみ、\ngarbage_collection*.csv 等は404)。東京都 catalog.data.metro.tokyo.lg.jp は CLI 403 だが\n配布実体\
  \ opendata.metro.tokyo.lg.jp/tachikawa/ は curl 200。\n難易度2: HTMLが構造的で曜日ルールは容易に抽出可。隔週の実日付は月次PDF併用が必要な点のみ手間。"
