  schedule_url: https://www.city.setagaya.lg.jp/documents/416/27-08-26.csv
  # 町丁目別「資源とごみの収集カレンダー」(令和8年版, no1〜no41)。年末年始・祝日の運用はここで確認する。
  # 毎年11月頃に翌年版 (12月〜翌12月) が更新・配布される。
  yearend_url: https://www.city.setagaya.lg.jp/02241/27859.html
notes:
  - 公式区分は 資源(週1回) / 可燃ごみ(週2回) / 不燃ごみ(月2回) / ペットボトル(月2回) の 4 つ。「資源」は古紙(新聞・雑誌類・紙パック・段ボール)・ガラスびん・缶を同じ日に回収する区分で、taxonomy では paper/glass_bottle/beverage_can に展開し days を共有させている (同日収集)。
  - "祝日も通常どおり収集する (振替休日含む)。収集カレンダー上で 昭和の日(4/29)・海の日(7/20)・山の日(8/11)・文化の日(11/3)・勤労感謝の日(11/23) に収集チップが入っていることを確認済み。休みは日曜と年末年始のみ。"
  - "年末年始: 令和8年版カレンダーが黄色地で「収集はありません」と明示するのは 2026-12-31 のみで、これを overrides に反映した。12/30 は通常収集 (対象地区6・7・8等は12/30水曜に可燃ごみを収集する)。一部の地区の 12/30 欄にある「収集はありません」は『その曜日に当たるが n 回目に該当しない』空欄の注記であって休止日ではない (37地区すべての PDF を目視確認)。"
  - "2027年始 (1/1〜1/3) は本カレンダーの収録範囲外 (令和8年版は 2025年12月〜2026年12月) のため overrides に入れていない。区は「令和8年年末〜令和9年年始の収集日は令和8年11月頃配布するカレンダーで確認」と告知しており、確定後に補正が必要。前年 (令和7年版) では 1/1〜1/3 が休止だった。"
  - "同様に 2027年1〜3月 (会計年度の残り) も本カレンダーの範囲外。区は『令和8年12月から令和9年12月の収集曜日は令和8年11月1日に更新予定』と告知しており、2026年12月以降に曜日改定が入る可能性がある。11月に yearend_url を再確認し fetch→build→verify を再実行すること。"
  - コース番号は区が配る町丁目別カレンダー PDF の「対象地区」番号 (no1〜no37) をそのまま採用している。course "12" = no12.pdf = 対象地区⑫。
  - "大規模集合住宅 12 件 (対象地区 no38〜no41: 防衛省池尻宿舎・都営アパート各棟・東京テラス・希望ヶ丘団地・アクティ三軒茶屋 等) は個別日程が組まれており、一次ソースの町丁目 CSV には現れないため本データの対象外。"
  - 古着・古布および一部の古紙は区収集でなく町会等の集団回収 (回収団体ごとに日程が異なる) のため対象外。粗大ごみは申込制のため対象外。
  - 三軒茶屋駅・下北沢駅周辺の一部地域は排出時刻が朝7時まで (他は朝8時まで)。収集日そのものは変わらない。
  - "検証(2026-07-20): (1) 一次ソース CSV 118 行と、配布ページ 416.html の HTML 表 118 行を全行・全列突合 (町名・丁目・4種別の日程・管轄清掃事務所)。表記が異なる (CSV「水曜日・土曜日」「2回目・4回目の月曜日」/ HTML「水・土曜日」「2・4回目の月曜日」) ため正規化して比較し、708 フィールド全一致・不一致 0。(2) CSV の日程シグネチャで畳んだ 37 群が、区が別ページ (27859.html) で配る町丁目別カレンダー PDF の「対象地区」1〜37 のグループ分けと完全一致 (118 町丁目の割り当てが両者で同一)。(3) 画像 PDF のため機械抽出不能 (テキスト層 8 文字) につき、全 37 地区のカレンダー PDF を日付レベルで目視照合: 2026年11月・12月の全収集日 (37地区 × 2ヶ月) が生成 YAML と完全一致、不一致 0。加えて 2026年4月 (地区1・12・24)・7月・8月 (地区6・19・28・33) を層化サンプリングで照合し全一致 (年度途中での曜日変更が無いことを確認)。"
  - "確率的信頼度: N=148 (37コース × 4種別 = 独立に誤りうるパターン数) を独立ソース (区カレンダー PDF) と日付レベルで照合しゼロ不一致。rule of three による 95% 上限は 3/148 ≒ 2.0%。CSV↔HTML 表の全行一致 (708 フィールド) と、シグネチャ畳み込みが区自身の対象地区 37 区分を再現した構造一致が独立の裏付けとなるため、残余リスクは主に『2026年12月以降の曜日改定』(区が11月に更新予定と明記) に集中する。等級 A。"
