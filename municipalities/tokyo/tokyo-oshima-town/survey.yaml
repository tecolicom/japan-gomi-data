notes: '一次ソースは公式サイト内「地区別ごみ収集カレンダー・分別表」(www.town.oshima.tokyo.jp/soshiki/suidou/gomi2025.html)。 2026年度版として6地区分の月別カレンダーPDF
  (attachment/8394〜8399.pdf) を掲載。 地区区分は集落単位で6つ: (1)元町1・2丁目/北の山/野増 (2)元町3・4丁目/岡田/泉津 (3)間伏 (4)差木地 (5)クダッチ (6)波浮港。
  PDFはテキスト層あり (pdftotextで日付・分別区分を抽出確認済み)。1日単位の日付グリッドカレンダーで granularity=dates。 会計年度 (4月〜翌3月) を通した暦なので年末年始も同一カレンダー内に明示
  → yearend=calendar-explicit。 分別区分: 可燃ごみ/金属ごみ/ビン・ガラス・瀬戸物/空き缶/ペットボトル/発泡スチロール。「収集しません」で祝日休止を明記。 難易度3: テキスト層PDFで抽出は容易だが、日付セルと分別ラベルの2次元グリッド構造をパースする必要があり、地区ごとに6ファイル。
  オープンデータCSV/JSONはページ内に存在せず。東京都オープンデータカタログ(CLI 403)およびWebSearchでも島嶼部ごみ収集の構造化データは確認できず。 ライセンス: 公式サイトフッターに「Copyright
  (C) Oshima Town All rights reserved.」のみ。オープンデータライセンス明記なし → unknown。 検証時 curl はツール権限拒否のため WebFetch/WebSearch と保存済みPDFの
  pdftotext で確認。 注意: 「西宮市大島町」など同名の別地名が検索に混入するため要区別。'
