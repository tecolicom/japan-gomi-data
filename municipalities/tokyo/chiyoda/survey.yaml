notes: '一次ソースは優先順⑤該当のテキスト層ありPDF。R8年度(2026)版カレンダーは r8calender-1〜12.pdf の12種 (wakekata/index.html の #calender セクションから全12リンクを
  grep で確認)。curl で r8calender-1.pdf は HTTP200 application/pdf 3.05MB、pdftotext で 「資源とごみの収集カレンダー①」「収集地域(飯田橋二・三丁目,
  神田神保町三丁目の偶数番地…)」 「令和8年4月〜」の日付マス目に 可燃/不燃/プラ/資源/蛍光管等 が抽出でき、テキスト層あり=機械抽出可を確認。 granularity=dates (日付入り通年)。年末年始は pdftotext
  上に「年末休み」「年始休み」の文字が 日付マスに直接記載=calendar-explicit (冊子 r701pamphlet でも閉庁日=12/31〜1/3 明記)。 地区割は町丁目単位で12カレンダーに割当 (HTMLに50音順の住所→No対応表あり。番地・偶奇で分割される町あり)。
  収集曜日はHTML本文にはテキスト化されておらず(「集積所により異なる」記載のみ)、実データはPDF/アプリ側。 CSV/JSONの直接配布は wakekata ページに無し (grep で .csv/.json 参照ゼロ)。
  東京都ODカタログはCLIがCloudFront 403のため未確認 (unknown)。 【JSON候補・未確認】区公式アプリ「分けちよ！」は gomisuke系 (Google Play id=jp.gomisuke.app.Gomisuke0018,
  提供G-Place)。さいたま(app0017)と同一ベンダで、0017は admin.gomisuke.jp/app/0017/api/jsonp.php?file=area が Referer付与で HTTP200
