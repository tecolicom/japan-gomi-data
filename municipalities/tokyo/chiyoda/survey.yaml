  ディレクトリ自体は200/空)。エンドポイント構造が 0017と異なる可能性があり、時間切れのため未特定。もし0018のJSONP実体が判明すれば source_type=json・ difficulty=2 に格上げ可能
  (要追加調査)。現時点の確実な機械可読ソースはPDFのため difficulty=3 とした。 【統括実測 2026-07-18】さいたま型 JSONP (admin.gomisuke.jp/app/0018/api/jsonp.php)
