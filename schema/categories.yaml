  kitchen:      { label: 生ごみ,       short: 生,     color: '#E8913A' }
  non_burnable: { label: 不燃ごみ,     short: 不燃,   color: '#6E6E6E' }
  plastic:      { label: プラスチック, short: プラ,   color: '#4A90E2' }
  pet_bottle:   { label: ペットボトル, short: ペット, color: '#5CB85C' }
  beverage_can: { label: 飲料缶,       short: 缶,     color: '#5B9BB0' }
  glass_bottle: { label: びん,         short: びん,   color: '#7A8A4A' }
  paper_cloth:  { label: 紙・布,       short: 紙布,   color: '#A87FBA' }
  cloth:        { label: 古布,         short: 古布,   color: '#B76E79' }
  paper:        { label: 古紙,         short: 古紙,   color: '#B8860B' }
  hazardous:    { label: 有害ごみ,     short: 有害,   color: '#735272' }
